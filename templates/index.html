<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTS Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,500;0,7..72,600;1,7..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- ============================================================
       TOOLBAR
  ============================================================ -->
  <header class="toolbar" role="banner">
    <span class="toolbar__brand" aria-hidden="true">TTS Reader</span>
    <div class="toolbar__sep" aria-hidden="true"></div>

    <!-- File picker -->
    <input
      type="file"
      id="file-input"
      accept=".md,.txt,.epub,.docx,.html,.htm,.pdf"
      data-i18n-aria-label="toolbar.chooseFileAria"
    >
    <label for="file-input" class="btn-file">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round"
           stroke-linejoin="round" aria-hidden="true">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span data-i18n="toolbar.chooseFile">Scegli file</span>
    </label>
    <span id="file-name" class="file-name" aria-live="polite" aria-atomic="true"></span>

    <div class="toolbar__sep" aria-hidden="true"></div>

    <!-- Selezione voce -->
    <div class="voice-wrapper">
      <label for="voice-select" class="voice-label" data-i18n="toolbar.voice">Voce</label>
      <select id="voice-select" data-i18n-aria-label="toolbar.voiceAria">
        <option value="" data-i18n="toolbar.loading">Caricamento...</option>
      </select>
    </div>

    <!-- Selezione stile di lettura -->
    <div class="voice-wrapper">
      <label for="style-select" class="voice-label" data-i18n="toolbar.style">Stile</label>
      <select id="style-select" data-i18n-aria-label="toolbar.styleAria">
        <option value="" data-i18n="toolbar.loading">Caricamento...</option>
      </select>
    </div>

    <!-- Bottone salva -->
    <button
      id="btn-save"
      class="btn-save hidden"
      type="button"
      data-i18n-aria-label="toolbar.saveAria"
      data-i18n-title="toolbar.saveTitle"
    >
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round"
           stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span data-i18n="toolbar.saveBtn">Salva MP3</span>
    </button>

    <!-- Language switcher -->
    <div class="lang-switcher" role="group" aria-label="Language">
      <button class="lang-btn lang-btn--active" data-lang="it" aria-pressed="true">IT</button>
      <button class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
    </div>
  </header>

  <!-- ============================================================
       BANNER ERRORE
  ============================================================ -->
  <div
    id="error-banner"
    class="error-banner hidden"
    role="alert"
    aria-live="assertive"
    aria-atomic="true"
  >
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round"
         stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12" y2="16"/>
    </svg>
    <span id="error-banner-msg" class="error-banner__msg"></span>
    <button
      class="error-banner__close"
      id="btn-close-error"
      data-i18n-aria-label="error.closeAria"
    >
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
           aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- ============================================================
       AREA DI LETTURA
  ============================================================ -->
  <main class="reader-area" id="reader-area" role="main">
    <div class="reader-card reader-card--empty" id="reader-card">
      <!-- Stato iniziale vuoto -->
      <div id="empty-state">
        <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <p class="empty-title" data-i18n="empty.title">Carica un file per iniziare</p>
        <p class="empty-sub" data-i18n="empty.formats">MD, TXT, EPUB, DOCX, HTML, PDF</p>
      </div>

      <!-- Paragrafo attivo (nascosto inizialmente) -->
      <p
        id="paragraph-text"
        class="paragraph-text hidden"
        aria-live="polite"
        aria-atomic="true"
      ></p>
    </div>
  </main>

  <!-- ============================================================
       BARRA INFERIORE: PROGRESS + CONTROLS
  ============================================================ -->
  <footer class="bottom-bar" role="contentinfo">

    <!-- Progress bar -->
    <div class="progress-section">
      <div
        class="progress-bar-wrapper"
        id="progress-bar"
        role="slider"
        data-i18n-aria-label="progress.aria"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
        tabindex="0"
        data-i18n-title="progress.sliderTitle"
      >
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-counter" id="progress-counter" aria-live="polite" aria-atomic="true"
           data-i18n="progress.counterEmpty">
        Paragrafo &mdash; / &mdash;
      </div>
    </div>

    <!-- Bottoni player -->
    <div class="player-controls" role="group" data-i18n-aria-label="player.controlsAria">

      <!-- Inizio -->
      <button
        class="player-btn"
        id="btn-start"
        data-i18n-aria-label="player.startAria"
        data-i18n-title="player.startTitle"
        disabled
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <rect x="5" y="5" width="2" height="14" rx="1"/>
          <polygon points="8,12 20,5 20,19"/>
        </svg>
      </button>

      <!-- Precedente -->
      <button
        class="player-btn"
        id="btn-prev"
        data-i18n-aria-label="player.prevAria"
        data-i18n-title="player.prevTitle"
        disabled
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <polygon points="19,5 7,12 19,19"/>
          <polygon points="11,5 5,8.5 5,15.5 11,19"/>
        </svg>
      </button>

      <!-- Play / Pausa -->
      <button
        class="player-btn player-btn--play"
        id="btn-play"
        data-i18n-aria-label="player.playAria"
        data-i18n-title="player.playTitle"
        disabled
      >
        <!-- Icona Play -->
        <svg id="icon-play" width="26" height="26" viewBox="0 0 24 24"
             fill="currentColor" aria-hidden="true">
          <polygon points="6,3 20,12 6,21"/>
        </svg>
        <!-- Icona Pausa (nascosta) -->
        <svg id="icon-pause" width="26" height="26" viewBox="0 0 24 24"
             fill="currentColor" aria-hidden="true" class="hidden">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
      </button>

      <!-- Stop -->
      <button
        class="player-btn"
        id="btn-stop"
        data-i18n-aria-label="player.stopAria"
        data-i18n-title="player.stopTitle"
        disabled
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <rect x="5" y="5" width="14" height="14" rx="2"/>
        </svg>
      </button>

      <!-- Successivo -->
      <button
        class="player-btn"
        id="btn-next"
        data-i18n-aria-label="player.nextAria"
        data-i18n-title="player.nextTitle"
        disabled
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <polygon points="5,5 17,12 5,19"/>
          <polygon points="13,5 19,8.5 19,15.5 13,19"/>
        </svg>
      </button>

      <!-- Ripeti -->
      <button
        class="player-btn"
        id="btn-repeat"
        data-i18n-aria-label="player.repeatAria"
        data-i18n-title="player.repeatTitle"
        disabled
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <polyline points="17 1 21 5 17 9"/>
          <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/>
          <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>

    </div>

    <!-- Etichette -->
    <div class="controls-labels" aria-hidden="true">
      <span class="ctrl-label" data-i18n="label.start">Inizio</span>
      <span class="ctrl-label" data-i18n="label.prev">Prec.</span>
      <span class="ctrl-label ctrl-label--play" data-i18n="label.playPause">Play / Pausa</span>
      <span class="ctrl-label" data-i18n="label.stop">Stop</span>
      <span class="ctrl-label" data-i18n="label.next">Succ.</span>
      <span class="ctrl-label" data-i18n="label.repeat">Ripeti</span>
    </div>

    <!-- Keyboard hint -->
    <p class="keyboard-hint" data-i18n-aria-label="kbd.aria">
      <kbd class="kbd" data-i18n="kbd.space">Spazio</kbd> <span data-i18n="kbd.playPause">Play/Pausa</span> &nbsp;
      <kbd class="kbd">&larr;</kbd> <span data-i18n="kbd.prev">Precedente</span> &nbsp;
      <kbd class="kbd">&rarr;</kbd> <span data-i18n="kbd.next">Successivo</span> &nbsp;
      <kbd class="kbd">R</kbd> <span data-i18n="kbd.repeat">Ripeti</span>
    </p>

  </footer>

  <!-- ============================================================
       JAVASCRIPT
  ============================================================ -->
  <script src="{{ url_for('static', filename='i18n.js') }}"></script>
  <script src="{{ url_for('static', filename='player.js') }}"></script>

</body>
</html>
