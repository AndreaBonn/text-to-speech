name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v3
        with:
          args: check

      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Generate test badge
        if: always()
        run: |
          python -c "
          import json, xml.etree.ElementTree as ET
          root = ET.parse('test-results.xml').getroot()
          suites = root.findall('testsuite') if root.tag == 'testsuites' else [root]
          tests = sum(int(s.attrib.get('tests', 0)) for s in suites)
          failures = sum(int(s.attrib.get('failures', 0)) for s in suites)
          errors = sum(int(s.attrib.get('errors', 0)) for s in suites)
          passed = tests - failures - errors
          badge = {
              'schemaVersion': 1,
              'label': 'tests',
              'message': f'{passed}/{tests} passed' if failures + errors > 0 else f'{passed} passed',
              'color': 'red' if failures + errors > 0 else 'brightgreen'
          }
          with open('badges/test-badge.json', 'w') as f:
              json.dump(badge, f)
          "

      - name: Commit badge
        if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/test-badge.json
          git diff --cached --quiet || git commit -m "ci: update test badge [skip ci]"
          git push

  security:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Audit dependencies
        run: pip-audit
